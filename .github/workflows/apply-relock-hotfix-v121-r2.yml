name: Apply relock hotfix v1.2.1 r2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-relock-hotfix-v121-r2.yml'

permissions:
  contents: write

jobs:
  patch-build-sign:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799

    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply lifecycle hotfix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          main = Path('app/src/main/java/com/neo/ezaccounting/MainActivity.java')
          text = main.read_text(encoding='utf-8')

          unlock_pattern = re.compile(
              r'(?ms)^(?P<i>[ \t]*)if \(requestCode == REQUEST_UNLOCK_APP\) \{\s*'
              r'authFlowInProgress = false;\s*'
              r'backgroundAt = 0;\s*'
              r'if \(resultCode == Activity\.RESULT_OK\) initializeApp\(\);\s*'
              r'else finishAndRemoveTask\(\);\s*'
              r'return;\s*'
              r'\}\s*'
          )

          def replace_unlock(match):
              i = match.group('i')
              j = i + '    '
              k = j + '    '
              return (
                  f'{i}if (requestCode == REQUEST_UNLOCK_APP) {{\n'
                  f'{j}authFlowInProgress = false;\n'
                  f'{j}backgroundAt = 0;\n'
                  f'{j}if (resultCode == Activity.RESULT_OK) {{\n'
                  f'{k}// Cold start needs initialization. Background re-lock keeps the existing page mounted.\n'
                  f'{k}if (!appInitialized) initializeApp();\n'
                  f'{j}}} else {{\n'
                  f'{k}finishAndRemoveTask();\n'
                  f'{j}}}\n'
                  f'{j}return;\n'
                  f'{i}}}\n'
              )

          text, unlock_count = unlock_pattern.subn(replace_unlock, text, count=1)
          if unlock_count != 1:
              raise SystemExit(f'Unable to patch unlock result block: {unlock_count}')

          resume_pattern = re.compile(
              r'(?ms)^(?P<i>[ \t]*)if \(backgroundAt > 0 && System\.currentTimeMillis\(\) - backgroundAt >= BACKGROUND_RELOCK_MS\) \{\s*'
              r'backgroundAt = 0;\s*'
              r'showLoadingScreen\("请重新验证身份…"\);\s*'
              r'requestAppUnlock\(\);\s*'
              r'\}\s*'
          )

          def replace_resume(match):
              i = match.group('i')
              j = i + '    '
              return (
                  f'{i}if (backgroundAt > 0 && System.currentTimeMillis() - backgroundAt >= BACKGROUND_RELOCK_MS) {{\n'
                  f'{j}backgroundAt = 0;\n'
                  f'{j}// LockActivity covers the current page; successful authentication reveals it again.\n'
                  f'{j}requestAppUnlock();\n'
                  f'{i}}}\n'
              )

          text, resume_count = resume_pattern.subn(replace_resume, text, count=1)
          if resume_count != 1:
              raise SystemExit(f'Unable to patch onResume block: {resume_count}')

          text = text.replace('EZAccounting/1.2.0', 'EZAccounting/1.2.1')
          main.write_text(text, encoding='utf-8')

          gradle = Path('app/build.gradle')
          text = gradle.read_text(encoding='utf-8')
          text = text.replace('versionCode 3', 'versionCode 4')
          text = text.replace("versionName '1.2.0'", "versionName '1.2.1'")
          gradle.write_text(text, encoding='utf-8')

          files = {
              Path('.github/workflows/android.yml'): [('v1.2.0-debug', 'v1.2.1-debug')],
              Path('.github/workflows/signed-release.yml'): [
                  ('v1.2.0-signed', 'v1.2.1-signed'),
                  ('Signed-Release-v1.2.0', 'Signed-Release-v1.2.1'),
              ],
              Path('README.md'): [('当前版本：`1.2.0`', '当前版本：`1.2.1`')],
          }
          for path, pairs in files.items():
              content = path.read_text(encoding='utf-8')
              for old, new in pairs:
                  content = content.replace(old, new)
              path.write_text(content, encoding='utf-8')

          for temporary in [
              Path('.github/workflows/apply-relock-hotfix-v121.yml'),
              Path('.github/workflows/apply-relock-hotfix-v121-r2.yml'),
          ]:
              if temporary.exists():
                  temporary.unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: restore page after background authentication"
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Restore and verify fixed keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/ez-accounting-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          ACTUAL_CERT_SHA256="$(keytool -exportcert -alias "$ANDROID_KEY_ALIAS" -keystore "$KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" -rfc | openssl x509 -noout -fingerprint -sha256 | cut -d= -f2 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL_CERT_SHA256" = "$EXPECTED_CERT_SHA256"

      - name: Build fixed-signature release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Verify and prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk 'dist/EZ记账-v1.2.1-debug.apk'
          cp app/build/outputs/apk/release/app-release.apk 'dist/EZ记账-v1.2.1-signed.apk'
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
          "$APKSIGNER" verify --verbose --print-certs 'dist/EZ记账-v1.2.1-signed.apk' | tee 'dist/EZ记账-v1.2.1-签名信息.txt'
          sha256sum dist/*.apk > 'dist/EZ记账-v1.2.1.sha256'

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.2.1-hotfix
          path: dist/*
          if-no-files-found: error
          retention-days: 30
