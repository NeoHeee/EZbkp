name: Publish EZ记账 v1.5.10

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Confirm version
        run: |
          grep -q "versionCode 18" app/build.gradle
          grep -q "versionName '1.5.10'" app/build.gradle
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Restore fixed signing key
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE"
          printf '%s' "$KEYSTORE" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
      - name: Test and build
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleRelease
      - name: Verify and prepare files
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk 'dist/EZ记账-v1.5.10.apk'
          OUT="$("$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs 'dist/EZ记账-v1.5.10.apk' 2>&1)"
          printf '%s\n' "$OUT" | tee 'dist/EZ记账-v1.5.10-签名信息.txt'
          ACTUAL="$(printf '%s\n' "$OUT" | awk -F': ' 'tolower($0) ~ /certificate sha-256 digest/ {print $2; exit}' | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"
          sha256sum 'dist/EZ记账-v1.5.10.apk' > 'dist/EZ记账-v1.5.10.apk.sha256'
      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## EZ记账 v1.5.10

          - 公网探测超时由2.6秒提升至6秒
          - 最多跟随5次HTTP/HTTPS重定向
          - 显示最终地址、重定向次数、DNS解析IP和TLS根因
          - 独立探测失败不再直接等同于网页不可访问
          - 固定公网、仅配置公网、上次成功公网可由WebView实际验证
          - WebView成功后线路状态显示“网页访问正常”
          - WebView真正失败后不再自动循环探测回退
          - 无效HTTPS证书仍严格阻止

          可直接覆盖安装v1.5.9，应用数据和配置会保留。
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.5.10-release
          path: dist/*
          if-no-files-found: error
          retention-days: 90
      - name: Publish GitHub Release
        run: |
          if gh release view v1.5.10 >/dev/null 2>&1; then
            gh release edit v1.5.10 --title 'EZ记账 v1.5.10' --notes-file release-notes.md --latest
            gh release upload v1.5.10 dist/* --clobber
          else
            gh release create v1.5.10 dist/* --title 'EZ记账 v1.5.10' --notes-file release-notes.md --latest
          fi
