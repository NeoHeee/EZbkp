name: Verify v1.5.0 Stable Core

on:
  push:
    branches:
      - feature/stable-core-v1.5.0
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/verify-v1.5.0.yml'
      - 'app/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Run lifecycle tests and build debug APK
        shell: bash
        run: |
          set +e
          gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug > v150-build.log 2>&1
          STATUS=$?
          tail -n 180 v150-build.log
          exit $STATUS
      - name: Upload full build log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: v1.5.0-build-log
          path: v150-build.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload debug APK
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.5.0-debug-verify
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
