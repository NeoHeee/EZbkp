name: Publish EZ Accounting v1.3.0

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-v1.3.0.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/ez-accounting-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run unit tests
        run: gradle --no-daemon :app:testDebugUnitTest

      - name: Build fixed-signature release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Verify fixed signature and prepare files
        shell: bash
        run: |
          mkdir -p dist
          APK='app/build/outputs/apk/release/app-release.apk'
          OUTPUT='dist/EZ记账-v1.3.0.apk'
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          cp "$APK" "$OUTPUT"
          CERT_OUTPUT="$("$APKSIGNER" verify --verbose --print-certs "$OUTPUT" 2>&1)"
          printf '%s\n' "$CERT_OUTPUT" | tee 'dist/EZ记账-v1.3.0-签名信息.txt'
          ACTUAL_CERT_SHA256="$(printf '%s\n' "$CERT_OUTPUT" | awk -F': ' 'tolower($0) ~ /certificate sha-256 digest/ {print $2; exit}' | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL_CERT_SHA256" = "$EXPECTED_CERT_SHA256"
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"

      - name: Create release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## EZ记账 v1.3.0

          本版本以稳定性和安全性整合为主。

          ### 新增
          - 自动锁定时间可选：立即、15秒、1分钟、5分钟或仅完全退出后
          - 可选熄屏后立即锁定
          - 隐藏菜单新增“立即锁定”
          - PIN和九宫格图形连续输错后启用递增等待限制

          ### 安全加固
          - HTTPS线路禁止混合加载HTTP子资源
          - 关闭不必要的 WebView 文件访问
          - 内部网页按协议、域名和端口进行同源判断
          - 限制外部链接协议，并安全处理 intent 链接

          ### 质量保障
          - 增加自动锁定与错误限速单元测试
          - 增加网页同源判断单元测试
          - 已通过固定签名构建与APK证书校验

          与 v1.1.0、v1.2.0、v1.2.1 正式版使用同一固定签名，可直接覆盖安装。
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view v1.3.0 >/dev/null 2>&1; then
            gh release edit v1.3.0 --title 'EZ记账 v1.3.0' --notes-file release-notes.md --latest
          else
            gh release create v1.3.0 --target "$GITHUB_SHA" --title 'EZ记账 v1.3.0' --notes-file release-notes.md --latest
          fi
          gh release upload v1.3.0 dist/* --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.3.0-release
          path: dist/*
          if-no-files-found: error
          retention-days: 90
