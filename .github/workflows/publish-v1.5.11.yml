name: Publish v1.5.11

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Confirm version
        run: |
          grep -q "versionCode 19" app/build.gradle
          grep -q "versionName '1.5.11'" app/build.gradle
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Restore fixed signing key
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_B64"
          printf '%s' "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          chmod 600 "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
      - name: Test and build
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleRelease
      - name: Verify and prepare files
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk 'dist/EZ记账-v1.5.11.apk'
          CERT_OUTPUT="$("$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs 'dist/EZ记账-v1.5.11.apk' 2>&1)"
          printf '%s\n' "$CERT_OUTPUT" | tee 'dist/EZ记账-v1.5.11-签名信息.txt'
          ACTUAL="$(printf '%s\n' "$CERT_OUTPUT" | awk -F': ' 'tolower($0) ~ /certificate sha-256 digest/ {print $2; exit}' | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"
          sha256sum 'dist/EZ记账-v1.5.11.apk' > 'dist/EZ记账-v1.5.11.apk.sha256'
      - uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.5.11-release
          path: dist/*
          if-no-files-found: error
          retention-days: 90
      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## EZ记账 v1.5.11

          - 修复软键盘遮挡公网地址输入框
          - 配置页获得焦点后自动滚动到当前输入框
          - 地址校验错误时自动定位到对应输入框
          - 本地地址支持“下一步”切换到公网地址
          - 公网地址支持键盘“完成”直接保存并连接
          - 配置页顶部直接复用正式应用图标，与桌面图标保持一致

          可直接覆盖安装 v1.5.10，现有地址、登录状态和安全设置会保留。
          EOF
      - name: Publish GitHub Release
        run: |
          if gh release view v1.5.11 >/dev/null 2>&1; then
            gh release edit v1.5.11 --title 'EZ记账 v1.5.11' --notes-file release-notes.md --latest
            gh release upload v1.5.11 dist/* --clobber
          else
            gh release create v1.5.11 dist/* --title 'EZ记账 v1.5.11' --notes-file release-notes.md --latest
          fi
