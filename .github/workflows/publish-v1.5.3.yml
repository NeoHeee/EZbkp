name: Publish EZ记账 v1.5.3

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/publish-v1.5.3.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799
    steps:
      - name: Checkout main source
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm version
        run: |
          grep -q "versionCode 11" app/build.gradle
          grep -q "versionName '1.5.3'" app/build.gradle

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/ez-accounting-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Verify fixed certificate
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          ACTUAL="$(keytool -list -v -keystore "$ANDROID_KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" | awk -F'SHA256: ' '/SHA256:/{print $2; exit}' | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run v1.5.3 tests
        run: gradle --no-daemon :app:testDebugUnitTest

      - name: Build fixed-signature APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Verify APK and prepare assets
        run: |
          mkdir -p dist
          OUTPUT='dist/EZ记账-v1.5.3.apk'
          CERT_INFO='dist/EZ记账-v1.5.3-签名信息.txt'
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          cp app/build/outputs/apk/release/app-release.apk "$OUTPUT"
          "$APKSIGNER" verify "$OUTPUT"
          "$APKSIGNER" verify --verbose --print-certs "$OUTPUT" > "$CERT_INFO" 2>&1
          ACTUAL="$(awk -F': ' 'tolower($0) ~ /certificate sha-256 digest/ {print $2; exit}' "$CERT_INFO" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"

      - name: Write release notes
        run: |
          cat > dist/release-notes.md <<'EOF'
          ## EZ记账 v1.5.3

          本次更新重点优化隐藏功能菜单的视觉和操作体验：

          - 改为底部弹出式快捷面板
          - 顶部显示线路模式、当前线路、最近延迟和安全验证状态
          - 功能按“线路与访问”“安全与控制”“页面与维护”分组
          - 每项增加图标、主标题、副说明和触摸反馈
          - 清除登录与缓存使用红色危险操作样式
          - 支持深色模式、圆角卡片、状态标签和底部关闭按钮
          - 保留 v1.5.2 快速启动、线路防抖、安全验证和下载能力

          与 v1.5.2 使用相同固定签名，可以直接覆盖安装。
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.5.3-release
          path: |
            dist/EZ记账-v1.5.3.apk
            dist/EZ记账-v1.5.3.apk.sha256
            dist/EZ记账-v1.5.3-签名信息.txt
            dist/release-notes.md
          if-no-files-found: error
          retention-days: 90

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.3
          name: EZ记账 v1.5.3
          body_path: dist/release-notes.md
          target_commitish: main
          make_latest: true
          files: |
            dist/EZ记账-v1.5.3.apk
            dist/EZ记账-v1.5.3.apk.sha256
            dist/EZ记账-v1.5.3-签名信息.txt
          fail_on_unmatched_files: true
