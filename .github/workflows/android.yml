name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply v1.3.0 integration
        if: ${{ hashFiles('scripts/apply_v130.py') != '' }}
        run: python3 scripts/apply_v130.py

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run unit tests and build debug APK
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug

      - name: Validate signing secrets
        if: ${{ github.event_name == 'pull_request' && hashFiles('app/src/test/java/com/neo/ezaccounting/LockPolicyTest.java') != '' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore fixed signing keystore
        if: ${{ github.event_name == 'pull_request' && hashFiles('app/src/test/java/com/neo/ezaccounting/LockPolicyTest.java') != '' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/ez-accounting-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Verify fixed certificate
        if: ${{ github.event_name == 'pull_request' && hashFiles('app/src/test/java/com/neo/ezaccounting/LockPolicyTest.java') != '' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          ACTUAL="$(keytool -list -v -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" \
            | awk -F'SHA256: ' '/SHA256:/{print $2; exit}' \
            | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"

      - name: Build fixed-signature release APK
        if: ${{ github.event_name == 'pull_request' && hashFiles('app/src/test/java/com/neo/ezaccounting/LockPolicyTest.java') != '' }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Prepare verified artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk 'dist/EZ记账-v1.3.0-debug.apk'
          sha256sum 'dist/EZ记账-v1.3.0-debug.apk' > 'dist/EZ记账-v1.3.0-debug.apk.sha256'
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            OUTPUT='dist/EZ记账-v1.3.0.apk'
            APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
            cp app/build/outputs/apk/release/app-release.apk "$OUTPUT"
            "$APKSIGNER" verify --verbose --print-certs "$OUTPUT" > 'dist/EZ记账-v1.3.0-签名信息.txt'
            sha256sum "$OUTPUT" > "$OUTPUT.sha256"
          fi

      - name: Upload verified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.3.0-verified
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: Commit integrated source
        if: ${{ github.event_name == 'pull_request' && hashFiles('scripts/apply_v130.py') == '' }}
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo 'No integration changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: integrate v1.3.0 stability and security hardening'
          git push origin HEAD:${{ github.head_ref }}
