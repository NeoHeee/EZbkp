name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Import source tree
        shell: bash
        run: |
          if [ -f .bootstrap/source.tar.gz.b64 ] && [ ! -f settings.gradle ]; then
            base64 --decode .bootstrap/source.tar.gz.b64 | tar -xzf - -C .
            rm -rf .bootstrap

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "feat: import EZ记账 Android source"
            git push origin "HEAD:${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          else
            echo "Source tree already present."
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk 'dist/EZ记账-v1.1.0.apk'
          cd dist
          sha256sum 'EZ记账-v1.1.0.apk' > 'EZ记账-v1.1.0.apk.sha256'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-Android
          path: dist/*
          if-no-files-found: error
          retention-days: 30
