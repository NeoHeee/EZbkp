name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  initialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize source tree
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        env:
          SOURCE_ARCHIVE: 
        run: |
          if [ -f settings.gradle ]; then
            echo "Repository is already initialized."
            exit 0
          fi

          echo "$SOURCE_ARCHIVE" | base64 --decode | tar -xzf - -C .

          cat > README.md <<'MARKDOWN'
          # EZ记账

          **EZ记账**是一款面向自托管 [ezBookkeeping](https://github.com/mayswind/ezbookkeeping) 的轻量 Android 客户端。应用以沉浸式 WebView 承载原始移动端界面，不在记账页面额外叠加标题栏或工具栏。

          > 本项目是非官方客户端，不包含 ezBookkeeping 服务端，也不隶属于 ezBookkeeping 官方项目。

          ## 主要功能

          - 全屏显示 ezBookkeeping 原始界面
          - 首次启动可同时配置本地地址和公网地址
          - 启动时优先检测本地线路，本地不可用时自动切换公网线路
          - 页面首次加载失败时自动尝试备用线路
          - 保持 Cookie 和登录状态
          - 下拉页面刷新
          - 双指长按页面打开隐藏功能菜单
          - 支持图片、账单和附件上传
          - 支持文件下载到 Android“下载”目录
          - 返回键优先返回网页上一页，首页再次返回时退出应用
          - 外部域名和非 HTTP 链接交给系统应用打开
          - 不绕过无效 HTTPS 证书

          ## 隐藏功能菜单

          在记账页面上使用**双指长按**，可打开隐藏菜单：

          - 返回首页
          - 重新检测线路
          - 在系统浏览器中打开
          - 更换本地/公网地址
          - 清除登录与缓存
          - 查看系统 WebView 信息

          ## 使用要求

          - Android 8.0 或更高版本
          - 已部署并可访问的 ezBookkeeping 服务端
          - 公网访问建议使用具有有效证书的 HTTPS 域名

          ## 首次配置

          应用允许填写一个或两个地址：

          - **本地地址**：例如 `http://192.168.1.100:8080`
          - **公网地址**：例如 `https://money.example.com`

          两个地址都填写时，每次启动会先检测本地线路；本地连接失败后再尝试公网线路。只填写其中一个地址也可以正常使用。

          ## 自动构建

          每次向 `main` 分支提交代码，GitHub Actions 都会构建 APK。构建完成后可在对应的 Actions 运行页面下载 `EZ记账-Android` 构建产物。

          本地构建需要 Java 17、Android SDK 35 和 Gradle 8.9：

          ```bash
          gradle --no-daemon :app:assembleDebug
          ```

          APK 输出位置：

          ```text
          app/build/outputs/apk/debug/app-debug.apk
          ```

          ## 项目信息

          - 应用名称：EZ记账
          - 包名：`com.neo.ezaccounting`
          - 当前版本：`1.1.0`
          - 最低 Android：8.0（API 26）
          - 目标 Android：API 35

          ## 签名说明

          当前 CI 默认生成调试签名 APK。正式长期发布前，建议在 GitHub Secrets 中配置固定签名证书，确保后续版本可以直接覆盖升级。

          ## 隐私

          服务器地址只保存在手机本地。账号和账目数据直接在手机与用户配置的 ezBookkeeping 服务端之间传输，本客户端不提供中转服务。

          ## 许可证

          本客户端代码采用 MIT License 发布。ezBookkeeping 及其名称、图标和服务端代码归原项目及其作者所有。
          MARKDOWN

          cat > LICENSE <<'LICENSE_TEXT'
          MIT License

          Copyright (c) 2026 NeoHeee

          Permission is hereby granted, free of charge, to any person obtaining a copy
          of this software and associated documentation files (the "Software"), to deal
          in the Software without restriction, including without limitation the rights
          to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
          copies of the Software, and to permit persons to whom the Software is
          furnished to do so, subject to the following conditions:

          The above copyright notice and this permission notice shall be included in all
          copies or substantial portions of the Software.

          THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
          IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
          FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
          AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
          LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
          OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
          SOFTWARE.
          LICENSE_TEXT

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: initialize EZ记账 Android client"
          git push

  build:
    needs: initialize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use initialized main branch
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk 'dist/EZ记账-v1.1.0.apk'
          cd dist
          sha256sum 'EZ记账-v1.1.0.apk' > 'EZ记账-v1.1.0.apk.sha256'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-Android
          path: dist/*
          if-no-files-found: error
          retention-days: 30
