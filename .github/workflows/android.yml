name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run tests and build debug APK
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk 'dist/EZ记账-v1.5.9-debug.apk'
          cd dist
          sha256sum 'EZ记账-v1.5.9-debug.apk' > 'EZ记账-v1.5.9-debug.apk.sha256'

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-Debug-v1.5.9
          path: dist/*
          if-no-files-found: error
          retention-days: 30
