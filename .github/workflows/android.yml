name: Android CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-debug:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply unified back navigation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, got {count}: {old[:100]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          main = 'app/src/main/java/com/neo/ezaccounting/MainActivity.java'
          replace_once(main,
              'import androidx.activity.result.ActivityResultLauncher;\n',
              'import androidx.activity.OnBackPressedCallback;\nimport androidx.activity.result.ActivityResultLauncher;\n')
          replace_once(main,
              '        registerScreenOffReceiver();\n\n        if (ShortcutActions.LOCK.equals(pendingShortcutAction)',
              '        registerScreenOffReceiver();\n        installBackHandler();\n\n        if (ShortcutActions.LOCK.equals(pendingShortcutAction)')
          replace_once(main,
              '''        serverSettingsVisible = false;
        String oldBase = webViewController.getBaseUrl();
''',
              '''        serverSettingsVisible = false;
        resetBackExit();
        String oldBase = webViewController.getBaseUrl();
''')
          replace_once(main,
              '''    public void onPageStarted(String url) {
        if (stateMachine.getState() != AppStateMachine.State.LOCKED &&
''',
              '''    public void onPageStarted(String url) {
        resetBackExit();
        if (stateMachine.getState() != AppStateMachine.State.LOCKED &&
''')
          replace_once(main,
              '''    public void onPageReady(String url) {
        lastWebUrl = url;
''',
              '''    public void onPageReady(String url) {
        resetBackExit();
        lastWebUrl = url;
''')
          replace_once(main,
              '''            public void onHome() {
                if (routeCoordinator.getActiveUrl() != null) {
                    webViewController.loadUrl(routeCoordinator.getActiveUrl());
                }
            }
''',
              '''            public void onHome() {
                navigateHome();
            }
''')
          replace_once(main,
              '''    @Override
    public void onBackPressed() {
        if ((stateMachine.getState() == AppStateMachine.State.READY ||
                stateMachine.getState() == AppStateMachine.State.LOADING_WEB) &&
                webViewController.canGoBack()) {
            webViewController.goBack();
            return;
        }
        if (stateMachine.getState() == AppStateMachine.State.SETTINGS &&
                routeCoordinator.hasConfiguredRoute()) {
            serverSettingsVisible = false;
            routeCoordinator.requestCheck(RouteCoordinator.Trigger.RETRY);
            return;
        }
        long now = System.currentTimeMillis();
        if (now - lastBackPressedAt > 1800L) {
            lastBackPressedAt = now;
            Toast.makeText(this, "再按一次返回键退出", Toast.LENGTH_SHORT).show();
            return;
        }
        super.onBackPressed();
    }
''',
              '''    private void installBackHandler() {
        getOnBackPressedDispatcher().addCallback(this, new OnBackPressedCallback(true) {
            @Override
            public void handleOnBackPressed() {
                handleUnifiedBack();
            }
        });
    }

    private void handleUnifiedBack() {
        long now = System.currentTimeMillis();
        String activeUrl = routeCoordinator == null ? null : routeCoordinator.getActiveUrl();
        String currentUrl = webViewController == null ? null : webViewController.currentUrl();
        boolean atHome = BackNavigationPolicy.isAtHome(activeUrl, currentUrl);
        BackNavigationPolicy.Action action = BackNavigationPolicy.decide(
                stateMachine == null ? null : stateMachine.getState(),
                webViewController != null && webViewController.canGoBack(),
                routeCoordinator != null && routeCoordinator.hasConfiguredRoute(),
                atHome, now, lastBackPressedAt);

        switch (action) {
            case WEB_BACK:
                webViewController.goBack();
                resetBackExit();
                break;
            case RESTORE_SETTINGS:
                restoreFromServerSettings();
                resetBackExit();
                break;
            case RECOVER_ERROR:
                recoverFromErrorPage();
                resetBackExit();
                break;
            case GO_HOME:
                navigateHome();
                resetBackExit();
                break;
            case EXIT:
                finishAndRemoveTask();
                break;
            case SHOW_EXIT_HINT:
            default:
                lastBackPressedAt = now;
                Toast.makeText(this, "再按一次返回键退出", Toast.LENGTH_SHORT).show();
                break;
        }
    }

    private void navigateHome() {
        if (routeCoordinator == null || webViewController == null) return;
        String activeUrl = routeCoordinator.getActiveUrl();
        if (activeUrl == null || activeUrl.trim().isEmpty()) return;
        lastWebUrl = activeUrl;
        transitionTo(AppStateMachine.State.LOADING_WEB);
        if (webViewController.isCreated()) {
            webViewController.loadRoot(activeUrl);
        } else {
            setContentView(webViewController.create(activeUrl, activeUrl));
        }
    }

    private void restoreFromServerSettings() {
        serverSettingsVisible = false;
        String activeUrl = routeCoordinator.getActiveUrl();
        if (activeUrl != null && !activeUrl.trim().isEmpty()) {
            String target = remapUrl(restoredBaseUrl, lastWebUrl, activeUrl);
            transitionTo(AppStateMachine.State.LOADING_WEB);
            setContentView(webViewController.create(activeUrl, target));
        } else if (routeCoordinator.hasConfiguredRoute()) {
            routeCoordinator.requestCheck(RouteCoordinator.Trigger.RETRY);
        } else {
            lastBackPressedAt = System.currentTimeMillis();
            Toast.makeText(this, "再按一次返回键退出", Toast.LENGTH_SHORT).show();
        }
    }

    private void recoverFromErrorPage() {
        String activeUrl = routeCoordinator.getActiveUrl();
        if (activeUrl != null && !activeUrl.trim().isEmpty()) {
            String target = remapUrl(restoredBaseUrl, lastWebUrl, activeUrl);
            transitionTo(AppStateMachine.State.LOADING_WEB);
            setContentView(webViewController.create(activeUrl, target));
        } else if (routeCoordinator.hasConfiguredRoute()) {
            routeCoordinator.requestCheck(RouteCoordinator.Trigger.RETRY);
        } else {
            showServerSettings();
        }
    }

    private void resetBackExit() {
        lastBackPressedAt = 0L;
    }
''')

          web = 'app/src/main/java/com/neo/ezaccounting/WebViewController.java'
          replace_once(web,
              '''    public void reload() {
        if (webView != null) {
            pageReady = false;
            webView.reload();
        }
    }
''',
              '''    public void reload() {
        if (webView != null) {
            pageReady = false;
            webView.reload();
        }
    }

    public void loadRoot(String url) {
        if (webView == null || url == null || url.trim().isEmpty()) return;
        pageReady = false;
        webView.clearHistory();
        webView.loadUrl(url);
    }
''')
          replace_once(web, ' EZAccounting/1.5.5"', ' EZAccounting/1.5.6"')

          settings = 'app/src/main/java/com/neo/ezaccounting/ServerSettingsPage.java'
          replace_once(settings,
              '进入记账界面后不会显示额外顶部栏。\\n下拉页面可刷新；双指快速双击可打开隐藏菜单。\\n',
              '进入记账界面后不会显示额外顶部栏。\\n可在快捷中心刷新页面；双指快速双击可打开隐藏菜单。\\n')

          gradle = 'app/build.gradle'
          replace_once(gradle,
              "        versionCode 13\n        versionName '1.5.5'",
              "        versionCode 14\n        versionName '1.5.6'")
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run tests and build Debug APK
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug

      - name: Commit verified implementation
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app
          git commit -m 'feat: unify back navigation for v1.5.6'
          git push origin "HEAD:$BRANCH"
