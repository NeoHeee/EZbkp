name: Commit relock hotfix v1.2.1

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-relock-hotfix-v121-r3.yml'

permissions:
  contents: write

jobs:
  commit-hotfix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: fix/relock-loading-v1.2.1
          fetch-depth: 0

      - name: Apply verified source changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main = Path('app/src/main/java/com/neo/ezaccounting/MainActivity.java')
          lines = main.read_text(encoding='utf-8').splitlines()
          output = []
          unlock_changes = 0
          loading_changes = 0
          i = 0

          while i < len(lines):
              line = lines[i]
              stripped = line.strip()
              if stripped == 'if (resultCode == Activity.RESULT_OK) initializeApp();':
                  if i + 1 >= len(lines) or lines[i + 1].strip() != 'else finishAndRemoveTask();':
                      raise SystemExit('Unexpected unlock block')
                  indent = line[:len(line) - len(line.lstrip())]
                  output.extend([
                      indent + 'if (resultCode == Activity.RESULT_OK) {',
                      indent + '    if (!appInitialized) initializeApp();',
                      indent + '} else {',
                      indent + '    finishAndRemoveTask();',
                      indent + '}',
                  ])
                  unlock_changes += 1
                  i += 2
                  continue
              if stripped == 'showLoadingScreen("请重新验证身份…");':
                  indent = line[:len(line) - len(line.lstrip())]
                  output.append(indent + '// Keep the existing page mounted under LockActivity.')
                  loading_changes += 1
                  i += 1
                  continue
              output.append(line)
              i += 1

          if unlock_changes != 1 or loading_changes != 1:
              raise SystemExit(f'Unexpected patch counts: {unlock_changes}, {loading_changes}')

          content = '\n'.join(output) + '\n'
          content = content.replace('EZAccounting/1.2.0', 'EZAccounting/1.2.1')
          main.write_text(content, encoding='utf-8')

          gradle = Path('app/build.gradle')
          content = gradle.read_text(encoding='utf-8')
          content = content.replace('versionCode 3', 'versionCode 4', 1)
          content = content.replace("versionName '1.2.0'", "versionName '1.2.1'", 1)
          gradle.write_text(content, encoding='utf-8')

          readme = Path('README.md')
          content = readme.read_text(encoding='utf-8')
          content = content.replace('当前版本：`1.2.0`', '当前版本：`1.2.1`')
          readme.write_text(content, encoding='utf-8')
          PY

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/neo/ezaccounting/MainActivity.java app/build.gradle README.md
          git commit -m "fix: restore page after background authentication"
          git push origin HEAD:fix/relock-loading-v1.2.1
