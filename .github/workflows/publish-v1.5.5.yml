name: Publish EZ记账 v1.5.5

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout main source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Confirm version
        run: |
          grep -q "versionName '1.5.5'" app/build.gradle
          grep -q "versionCode 13" app/build.gradle

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/ez-accounting-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Verify fixed certificate
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          ACTUAL="$(keytool -list -v -keystore "$ANDROID_KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" | awk -F': ' 'tolower($0) ~ /sha256:/ {print $2; exit}' | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run v1.5.5 tests
        run: gradle --no-daemon :app:testDebugUnitTest

      - name: Build fixed-signature APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Verify APK and prepare assets
        run: |
          mkdir -p dist
          APK='app/build/outputs/apk/release/app-release.apk'
          OUTPUT='dist/EZ记账-v1.5.5.apk'
          CERT_INFO='dist/EZ记账-v1.5.5-签名信息.txt'
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          cp "$APK" "$OUTPUT"
          CERT_OUTPUT="$("$APKSIGNER" verify --verbose --print-certs "$OUTPUT" 2>&1)"
          printf '%s\n' "$CERT_OUTPUT" | tee "$CERT_INFO"
          ACTUAL="$(printf '%s\n' "$CERT_OUTPUT" | awk -F': ' 'tolower($0) ~ /certificate sha-256 digest/ {print $2; exit}' | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## EZ记账 v1.5.5

          本版本调整页面刷新方式：

          - 取消下拉刷新手势，避免滚动页面或填写表单时误刷新
          - WebView 恢复为原生全屏滚动容器
          - 居中快捷中心增加“刷新当前页面”
          - 手动刷新只重新加载当前网页，不测速、不切换线路
          - 页面尚未创建时会提示“当前页面尚未加载”
          - 原生错误恢复页继续保留“重新连接”
          - 移除不再使用的 SwipeRefreshLayout 依赖

          可直接覆盖安装 v1.5.4，应用数据与配置会保留。
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.5.5-release
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: Create or update GitHub Release
        run: |
          if gh release view v1.5.5 >/dev/null 2>&1; then
            gh release edit v1.5.5 --title 'EZ记账 v1.5.5' --notes-file release-notes.md --latest
            gh release upload v1.5.5 dist/* --clobber
          else
            gh release create v1.5.5 dist/* --title 'EZ记账 v1.5.5' --notes-file release-notes.md --latest
          fi
