name: Verify Signed v1.5.10

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signed-release:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799
    steps:
      - uses: actions/checkout@v4
      - name: Restore fixed keystore
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE"
          printf '%s' "$KEYSTORE" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Test and build signed APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleRelease
      - name: Verify fixed certificate
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk 'dist/EZ记账-v1.5.10.apk'
          OUT="$("$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs 'dist/EZ记账-v1.5.10.apk' 2>&1)"
          printf '%s\n' "$OUT" | tee 'dist/EZ记账-v1.5.10-签名信息.txt'
          ACTUAL="$(printf '%s\n' "$OUT" | awk -F': ' 'tolower($0) ~ /certificate sha-256 digest/ {print $2; exit}' | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"
          sha256sum 'dist/EZ记账-v1.5.10.apk' > 'dist/EZ记账-v1.5.10.apk.sha256'
      - uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.5.10-signed-verification
          path: dist/*
          if-no-files-found: error
