name: Publish EZ记账 v1.5.2

on:
  pull_request:
    branches:
      - main
    types: [opened]
    paths:
      - '.github/workflows/publish-v1.5.2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799

    steps:
      - name: Checkout main source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Confirm version
        shell: bash
        run: |
          grep -q "versionCode 10" app/build.gradle
          grep -q "versionName '1.5.2'" app/build.gradle

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/ez-accounting-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Verify fixed certificate
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          ACTUAL="$(keytool -list -v -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" \
            | awk -F'SHA256: ' '/SHA256:/{print $2; exit}' \
            | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run v1.5.2 tests
        run: gradle --no-daemon :app:testDebugUnitTest

      - name: Build fixed-signature APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Verify APK and prepare assets
        shell: bash
        run: |
          mkdir -p dist
          OUTPUT='dist/EZ记账-v1.5.2.apk'
          CERT_INFO='dist/EZ记账-v1.5.2-签名信息.txt'
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          cp app/build/outputs/apk/release/app-release.apk "$OUTPUT"
          "$APKSIGNER" verify "$OUTPUT"
          "$APKSIGNER" verify --verbose --print-certs "$OUTPUT" > "$CERT_INFO" 2>&1
          ACTUAL="$(awk -F': ' 'tolower($0) ~ /certificate sha-256 digest/ {print $2; exit}' "$CERT_INFO" \
            | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"

      - name: Write release notes
        shell: bash
        run: |
          cat > dist/RELEASE_NOTES.md <<'EOF'
          ## EZ记账 v1.5.2

          本版本重点优化启动速度：

          - 自动模式优先复用上次成功线路，直接进入主页面
          - 固定本地或固定公网模式直接进入对应线路
          - 仅配置一条线路时直接进入
          - 主页面加载后再后台静默并行测速
          - 后台测速不会覆盖当前页面，也不会因轻微延迟差异立即切换
          - 当前线路加载失败后，继续使用连续失败确认与备用线路回退
          - 首次配置、地址发生变化或没有有效历史线路时，仍执行前台线路检测

          与 v1.5.1 使用同一固定签名，可以直接覆盖安装。
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.5.2-release
          path: |
            dist/EZ记账-v1.5.2.apk
            dist/EZ记账-v1.5.2.apk.sha256
            dist/EZ记账-v1.5.2-签名信息.txt
          if-no-files-found: error
          retention-days: 90

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.2
          name: EZ记账 v1.5.2
          target_commitish: main
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/EZ记账-v1.5.2.apk
            dist/EZ记账-v1.5.2.apk.sha256
            dist/EZ记账-v1.5.2-签名信息.txt
          draft: false
          prerelease: false
          make_latest: true
