name: Publish v1.5.8

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Confirm version
        run: |
          grep -q "versionCode 16" app/build.gradle
          grep -q "versionName '1.5.8'" app/build.gradle

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore fixed signing key
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_B64"
          printf '%s' "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Test and build
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleRelease

      - name: Verify and prepare files
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk 'dist/EZ记账-v1.5.8.apk'
          OUT="$("$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs 'dist/EZ记账-v1.5.8.apk' 2>&1)"
          printf '%s\n' "$OUT" | tee 'dist/EZ记账-v1.5.8-签名信息.txt'
          ACTUAL="$(printf '%s\n' "$OUT" | awk -F': ' 'tolower($0) ~ /certificate sha-256 digest/ {print $2; exit}' | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"
          sha256sum 'dist/EZ记账-v1.5.8.apk' > 'dist/EZ记账-v1.5.8.apk.sha256'

      - uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.5.8-release
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        run: |
          cat > notes.md <<'EOF'
          ## EZ记账 v1.5.8

          - 修复截图所示 ezBookkeeping 首页仍被识别为非首页的问题
          - 不再只依赖 WebView URL 判断首页
          - 直接识别当前页面的月度汇总卡和交易概览列表
          - 首页带内部路由、查询参数或残留历史时仍支持二次返回退出
          - 异步页面检测不会吞掉快速的第二次返回操作
          - 保留非首页网页后退、设置页恢复和错误页恢复逻辑

          可直接覆盖安装 v1.5.7，应用数据和配置会保留。
          EOF
          if gh release view v1.5.8 >/dev/null 2>&1; then
            gh release edit v1.5.8 --title 'EZ记账 v1.5.8' --notes-file notes.md --latest
            gh release upload v1.5.8 dist/* --clobber
          else
            gh release create v1.5.8 dist/* --title 'EZ记账 v1.5.8' --notes-file notes.md --latest
          fi
