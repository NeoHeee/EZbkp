name: Publish EZ记账 v1.4.0

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/publish-v1.4.0.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799
      RELEASE_TAG: v1.4.0
      RELEASE_TITLE: EZ记账 v1.4.0

    steps:
      - name: Checkout main source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/ez-accounting-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Verify fixed keystore certificate
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          ACTUAL="$(keytool -list -v -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" \
            | awk -F'SHA256: ' '/SHA256:/{print $2; exit}' \
            | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          test "$ACTUAL" = "$EXPECTED_CERT_SHA256"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run unit tests
        run: gradle --no-daemon :app:testDebugUnitTest

      - name: Build fixed-signature release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Verify APK signature and prepare release assets
        shell: bash
        run: |
          mkdir -p dist
          APK='app/build/outputs/apk/release/app-release.apk'
          OUTPUT='dist/EZ记账-v1.4.0.apk'
          CERT_INFO='dist/EZ记账-v1.4.0-签名信息.txt'
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
          test -f "$APK"
          test -x "$APKSIGNER"
          cp "$APK" "$OUTPUT"
          "$APKSIGNER" verify "$OUTPUT"
          "$APKSIGNER" verify --verbose --print-certs "$OUTPUT" > "$CERT_INFO" 2>&1
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## EZ记账 v1.4.0

          ### 体验增强

          - 长按桌面图标可快速进入线路设置、安全设置、立即锁定和检查更新。
          - 跟随系统深色模式，适配状态栏、导航栏、首次配置页和安全验证页面。
          - 支持相机拍照、Android 系统照片选择器、多张图片选择和普通附件选择。
          - 下载文件保存到独立目录，自动避免重名，完成后可直接打开。
          - 本地与公网线路改为并行测速，结合延迟、上次成功线路和本地优先策略自动选择。
          - Wi-Fi与移动网络发生变化时自动重新判断线路，并尽量保留当前页面路径。
          - 隐藏菜单新增线路状态、延迟测速和应用内检查更新。
          - 应用内可读取 GitHub Releases 最新版本、更新说明和 APK 下载入口。

          ### 安装

          与 v1.3.1 使用相同固定签名，可以直接覆盖安装。

          固定签名证书 SHA-256：

          `d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799`
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-v1.4.0-release
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-notes.md --latest
          else
            gh release create "$RELEASE_TAG" dist/* --target main --title "$RELEASE_TITLE" --notes-file release-notes.md --latest
          fi
