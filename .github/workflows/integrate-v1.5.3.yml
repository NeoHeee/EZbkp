name: Integrate v1.5.3 Quick Actions UI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/quick-actions-ui-v1.5.3
          fetch-depth: 0
      - name: Apply UI integration
        run: python3 scripts/apply_v1_5_3.py
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Run tests and build debug APK
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug
      - name: Commit integrated source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app README.md
          git commit -m 'feat: v1.5.3 quick actions UI [v1.5.3-applied]'
          git push origin HEAD:feature/quick-actions-ui-v1.5.3
