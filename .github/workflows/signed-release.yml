name: Signed Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - '.github/signing-trigger'

permissions:
  contents: read

jobs:
  build-signed-release:
    runs-on: ubuntu-latest

    env:
      EXPECTED_CERT_SHA256: d29d3f581d1a90b12a067317c6f7295783727e1573e7c283e09ef398ca64b799

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo 'Missing ANDROID_KEYSTORE_BASE64'; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo 'Missing ANDROID_KEYSTORE_PASSWORD'; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo 'Missing ANDROID_KEY_ALIAS'; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo 'Missing ANDROID_KEY_PASSWORD'; exit 1; }

      - name: Restore signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/ez-accounting-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build signed release APK
        id: release_build
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set +e
          gradle --no-daemon :app:assembleRelease --stacktrace > build-release.log 2>&1
          STATUS=$?
          echo '===== Gradle release build tail ====='
          tail -n 180 build-release.log
          exit "$STATUS"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-Signed-Build-Log
          path: build-release.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify signature and prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          APK='app/build/outputs/apk/release/app-release.apk'
          OUTPUT='dist/EZ记账-v1.1.0-signed.apk'
          cp "$APK" "$OUTPUT"

          apksigner verify --verbose --print-certs "$OUTPUT" | tee dist/signing-certificate.txt
          ACTUAL_CERT_SHA256="$(apksigner verify --print-certs "$OUTPUT" | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' | head -1 | tr '[:upper:]' '[:lower:]')"

          if [ "$ACTUAL_CERT_SHA256" != "$EXPECTED_CERT_SHA256" ]; then
            echo "Unexpected signing certificate: $ACTUAL_CERT_SHA256"
            exit 1
          fi

          printf '%s\n' "$ACTUAL_CERT_SHA256" > dist/signing-certificate.sha256
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-Signed-Release
          path: dist/*
          if-no-files-found: error
          retention-days: 90
