name: Integrate v1.5.2 Fast Start

on:
  pull_request:
    branches:
      - main
    types: [synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/fast-start-v1.5.2
          fetch-depth: 0
      - name: Apply source patch without changing protected workflows
        run: |
          cp .github/workflows/android.yml /tmp/android.yml
          cp .github/workflows/signed-release.yml /tmp/signed-release.yml
          python3 scripts/apply_v1_5_2.py
          cp /tmp/android.yml .github/workflows/android.yml
          cp /tmp/signed-release.yml .github/workflows/signed-release.yml
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Test and build
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug
      - name: Commit integrated source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: v1.5.2 fast startup [v1.5.2-applied]'
          git push origin HEAD:fix/fast-start-v1.5.2
