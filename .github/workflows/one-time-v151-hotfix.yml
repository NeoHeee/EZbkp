name: One-time v1.5.1 Crash Hotfix

on:
  push:
    branches: [main]
    paths: ['.github/workflows/one-time-v151-hotfix.yml']

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/v1.5.1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Apply runtime safeguards
        shell: python
        run: |
          from pathlib import Path

          main = Path('app/src/main/java/com/neo/ezaccounting/MainActivity.java')
          text = main.read_text()
          old = 'if (stateMachine.getState() != next) stateMachine.transitionTo(next);'
          new = 'if (stateMachine.getState() != next) stateMachine.transitionSafely(next);'
          if old not in text and new not in text:
              raise SystemExit('transition method not found')
          text = text.replace(old, new)

          old_receiver = '''    private void registerScreenOffReceiver() {
                  if (screenReceiverRegistered) return;
                  IntentFilter filter = new IntentFilter(Intent.ACTION_SCREEN_OFF);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(screenOffReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
                  } else {
                      registerReceiver(screenOffReceiver, filter);
                  }
                  screenReceiverRegistered = true;
              }'''
          new_receiver = '''    private void registerScreenOffReceiver() {
                  if (screenReceiverRegistered) return;
                  try {
                      IntentFilter filter = new IntentFilter(Intent.ACTION_SCREEN_OFF);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                          registerReceiver(screenOffReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
                      } else {
                          registerReceiver(screenOffReceiver, filter);
                      }
                      screenReceiverRegistered = true;
                  } catch (RuntimeException ignored) {
                      screenReceiverRegistered = false;
                  }
              }'''
          if old_receiver in text:
              text = text.replace(old_receiver, new_receiver)

          old_start = '''        if (networkMonitor != null) networkMonitor.start();
                  if (downloadController != null) downloadController.register();'''
          new_start = '''        try { if (networkMonitor != null) networkMonitor.start(); } catch (RuntimeException ignored) {}
                  try { if (downloadController != null) downloadController.register(); } catch (RuntimeException ignored) {}'''
          if old_start in text:
              text = text.replace(old_start, new_start)
          main.write_text(text)

          settings = Path('app/src/main/java/com/neo/ezaccounting/SecuritySettingsActivity.java')
          text = settings.read_text()
          old_create = '''        UiTheme.applySystemBars(this);
                  showSettings();'''
          new_create = '''        try {
                      UiTheme.applySystemBars(this);
                      showSettings();
                  } catch (RuntimeException error) {
                      showRecoveryPage();
                  }'''
          if old_create in text:
              text = text.replace(old_create, new_create)
          marker = '    private void showSettings() {'
          if 'private void showRecoveryPage()' not in text:
              recovery = '''    private void showRecoveryPage() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setPadding(dp(28), dp(28), dp(28), dp(28));
                  root.setBackgroundColor(UiTheme.background(this));
                  TextView title = new TextView(this);
                  title.setText("安全设置暂时无法打开");
                  title.setTextSize(22);
                  title.setTextColor(UiTheme.primaryText(this));
                  title.setGravity(Gravity.CENTER);
                  root.addView(title, fullWrap(dp(16)));
                  TextView detail = new TextView(this);
                  detail.setText("已阻止页面异常导致应用闪退。请返回主界面后重试。");
                  detail.setTextSize(15);
                  detail.setTextColor(UiTheme.secondaryText(this));
                  detail.setGravity(Gravity.CENTER);
                  root.addView(detail, fullWrap(dp(20)));
                  Button back = optionButton("返回", "返回 EZ记账 主界面");
                  back.setOnClickListener(v -> finish());
                  root.addView(back, fullWrap(0));
                  setContentView(root);
              }

          '''
              text = text.replace(marker, recovery + marker)
          settings.write_text(text)

          test = Path('app/src/test/java/com/neo/ezaccounting/AppStateMachineTest.java')
          t = test.read_text()
          if 'safeTransitionRecoversFromUnexpectedLifecycleOrder' not in t:
              extra = '''
                  @Test
                  public void safeTransitionRecoversFromUnexpectedLifecycleOrder() {
                      AppStateMachine machine = new AppStateMachine(AppStateMachine.State.INITIALIZING);
                      assertTrue(machine.transitionSafely(AppStateMachine.State.READY));
                      assertEquals(AppStateMachine.State.READY, machine.getState());
                  }
              '''
              t = t.rsplit('\n}', 1)[0] + extra + '\n}\n'
              test.write_text(t)
      - name: Test and build
        run: gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug
      - name: Commit to hotfix branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add app
          git commit -m 'fix: prevent startup and security settings crashes' || true
          git push origin HEAD:hotfix/v1.5.1
